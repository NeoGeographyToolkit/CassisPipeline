# cassis_recipe.conf - shared recipe constants, identical for every site. Sourced by the
# pipeline AFTER the per-site config. Edit a value ONLY with a rationale comment on the same
# line. These constants are the same across all validated sites (004756, ox1, ox2, jezero).
# NOTE: these are bash assignments (this file is sourced).
mapprojRes=4.59      # framelet mapproject + correlate grid (NATIVE ~4.59 m; never coarse)
demRes=18            # point2dem / DEM / mosaic grid (m)
corrRes=18           # DEM-vs-CTX hillshade-correlation grid (bootstrap + eval)
corrSearch=25        # DEM-vs-CTX corr search radius (px); coarse 18 m registration, ample
htUncTic=200         # tic BA heights-from-dem-uncertainty (m) - loose vertical (horiz anchor)
htUncToc=1           # toc BA heights-from-dem-uncertainty (m) - tight vertical
camPosUnc=500,500    # camera-position-uncertainty (m, x,y)
robust=2             # BA robust threshold
gcpSigma=1           # dem2gcp GCP sigma
maxGcp=200000        # dem2gcp GCP cap
maxDisp=50           # dem2gcp disparity filter (m)
geounc=0             # stereo mapproj-geolocation-uncertainty (px). NEW DEFAULT 2026-07-12
                     # (was 50; the 50 px collar grew the mask into one-image ground -> spurious
                     # matches -> seams).
# --- STAGE 0 shared constants (identical across sites; added 2026-07-13 for the e2e master) ---
# The frozen "jfg" transverse lens (20 coeffs). Byte-identical across all 5 sites (md5 verified).
# Used by stage 5 transplant (cam_gen --distortion). The precious record - do NOT edit casually.
LENS="-10.804763 0.971586 0.011599 0.000734 -0.000389 0.000614 -0.000022 0.000001 0.000008 0.000019 1.112497 0.006055 0.697006 -0.000110 0.000655 -0.025548 -0.000004 -0.000024 0.000006 -0.000743"
refitPosUnc=100,100  # stage-5 transplant cam_gen --camera-position-uncertainty (m); pose leash
refitPixSamples=4000 # stage-5 transplant cam_gen --num-pixel-samples
refitDatum=D_MARS    # stage-5 transplant cam_gen --datum
# stage-6 dense matches (cassis_stereo DENSE mode):
num_matches_from_disp=20000  # --num-matches-from-disparity per pair (0 -> skip dense generation,
                     # do not add the flag to the stereo cmd)
denseGeounc=30       # PRE-BA search collar (px) for the dense L-R mapproj stereo. DIFFERENT param from
                     # the DEM-stereo geounc=0: pre-BA the cameras are not yet refined, so real IPs
                     # carry disparity that a 0 collar filters out (0 -> "19 IPs < 20" -> every LR pair
                     # fails). 30 is the value the dense baseline used; confirm/tune. NOT the DEM geounc.
# --- project C: pass2 TOC gcp mode (default; a site conf may override to soft_gcp) ---
pass2TocGcp=no_gcp   # pass2 TOC BA gcp: no_gcp = pure vertical (default, all sites unchanged).
                     # soft_gcp = reuse the stage-1 gcp at its baked sigma, fixgcp=no, to pull
                     # under-constrained END framelets toward CTX (ox1 end-framelet drift fix).
