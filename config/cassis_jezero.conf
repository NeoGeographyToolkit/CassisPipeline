# cassis_jezero.conf - INPUT config for Jezero crater, MY36_016378_162.
# Sourced as shell variables. Paths are relative to the work dir (or absolute).
# Inputs only; the pipeline checks each exists before starting. The output
# directory is passed on the command line (it changes per run), not set here.
inputCassisDir=data/jezero/MY36_016378_162           # any dir holding the two looks' cubs
Llook=838849161                                      # left look id (ESA); cubs are ...-PAN-838849161-...
Rlook=838849162                                      # right look id
refDem=ref/jezero_ctx/jezero_ctx_18m.tif             # CTX reference DEM
mapprojDem=ref/jezero_ctx/jezero_ctx_18m_blur5.tif   # blurred CTX drape for mapprojection
