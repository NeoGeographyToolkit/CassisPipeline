# cassis_gusev.conf - INPUT config for Gusev crater, MY34_003860_344.
# Sourced as shell variables. Paths are relative to the work dir (or absolute).
# Inputs only; the pipeline checks each exists before starting. The output
# directory is passed on the command line (it changes per run), not set here.
inputCassisDir=data/gusev/MY34_003860_344            # any dir holding the two looks' cubs
Llook=276342113                                      # left look id (ESA); cubs are ...-PAN-276342113-...
Rlook=276342114                                      # right look id
refDem=ref/gusev_ctx/gusev_ctx_18m.tif               # CTX reference DEM
mapprojDem=ref/gusev_ctx/gusev_ctx_18m_blur5.tif     # blurred CTX DEM
