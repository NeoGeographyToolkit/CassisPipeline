# cassis_ox2.conf - INPUT config for Oxia Planum 2, MY34_004172_162 (shares the Oxia CTX with ox1).
# Sourced as shell variables. Paths are relative to the work dir (or absolute).
# Inputs only; the pipeline checks each exists before starting. The output
# directory is passed on the command line (it changes per run), not set here.
inputCassisDir=data/oxia_planum/MY34_004172_162              # any dir holding the two looks' cubs
Llook=276980361                                              # left look id (ESA); cubs are ...-PAN-276980361-...
Rlook=276980362                                              # right look id
refDem=ref/oxia_planum_ctx/oxia_planum_ctx_18m.tif           # CTX reference DEM
mapprojDem=ref/oxia_planum_ctx/oxia_planum_ctx_18m_blur5.tif # blurred CTX drape for mapprojection
