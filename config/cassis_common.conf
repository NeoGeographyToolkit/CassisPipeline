# cassis_common.conf - shared recipe constants, the same for every site. Sourced after the
# per-site config. These are bash assignments. Edit with care.
mapprojRes=4.59      # framelet mapproject + correlate grid (native ~4.59 m)
demRes=18            # point2dem / DEM / mosaic grid (m)
corrRes=18           # DEM-vs-CTX hillshade-correlation grid (bootstrap + evaluation)
corrSearch=25        # DEM-vs-CTX correlation search radius (px)
htUncLoose=200       # first BA heights-from-dem uncertainty (m): loose height, so the fixed GCP drives the horizontal fit
htUncTight=1         # second BA heights-from-dem uncertainty (m): tight, locks the height onto the reference DEM
camPosUnc=500,500    # camera-position-uncertainty (m, x,y)
robust=2             # BA robust threshold
gcpSigma=1           # dem2gcp GCP sigma
maxGcp=200000        # dem2gcp GCP cap
maxDisp=50           # dem2gcp disparity filter (m)
geounc=0             # stereo mapproj-geolocation-uncertainty (px); 0 avoids spurious matches from an over-grown collar
# The frozen transverse-distortion lens (20 coefficients), a global CaSSIS instrument constant.
# Used by stage 5 (cam_gen --distortion). Do not edit.
optimized_distortion="-10.804763 0.971586 0.011599 0.000734 -0.000389 0.000614 -0.000022 0.000001 0.000008 0.000019 1.112497 0.006055 0.697006 -0.000110 0.000655 -0.025548 -0.000004 -0.000024 0.000006 -0.000743"
refitPosUnc=100,100  # stage-5 cam_gen --camera-position-uncertainty (m)
refitPixSamples=4000 # stage-5 cam_gen --num-pixel-samples
refitDatum=D_MARS    # stage-5 cam_gen --datum
num_matches_from_disp=20000  # stage-6 --num-matches-from-disparity per pair (0 = skip dense-match generation)
denseGeounc=30       # stage-6 dense L-R search collar (px); the cameras are not yet bundle-adjusted here
pass2Gcp=no_gcp      # pass2 second-BA gcp mode: no_gcp (pure vertical) or soft_gcp (pull under-constrained end framelets)
